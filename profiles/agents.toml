# AI coding agent profiles

# Claude Code — full network (API + git + npm + vscode)
[[profile]]
name = "claude-full"

[[profile.match]]
command = "claude"

[profile.network]
mode = "filtered"
allowed_domains = [
    # Claude API
    "api.anthropic.com",
    "statsig.anthropic.com",
    "statsig.com",
    "sentry.io",
    "*.sentry.io",
    # npm (self-updates, mcp packages)
    "registry.npmjs.org",
    "*.npmjs.org",
    # GitHub (git operations, API, downloads)
    "github.com",
    "*.github.com",
    "*.githubusercontent.com",
    "*.githubassets.com",
    # VS Code marketplace (extensions)
    "marketplace.visualstudio.com",
    "vscode.blob.core.windows.net",
    "update.code.visualstudio.com",
    "*.vscode-cdn.net",
    # Google (web search tool)
    "*.google.com",
    "*.googleapis.com",
]
allowed_ports = [80, 443]

[[profile.filesystem.bind]]
source = "~/.claude"
target = "~/.claude"
mode = "rw"
create = true

[[profile.filesystem.bind]]
source = "~/.config"
target = "~/.config"
mode = "rw"
optional = true

[[profile.filesystem.bind]]
source = "~/.npm-global"
target = "~/.npm-global"
mode = "ro"
optional = true

[[profile.filesystem.bind]]
source = "~/.npm"
target = "~/.npm"
mode = "rw"
optional = true

[[profile.filesystem.bind]]
source = "~/.gitconfig"
target = "~/.gitconfig"
mode = "ro"
optional = true

[[profile.filesystem.bind]]
source = "~/.ssh"
target = "~/.ssh"
mode = "ro"
optional = true

[profile.env]
pass = [
    "HOME", "USER", "PATH", "TERM", "LANG", "SHELL",
    "ANTHROPIC_API_KEY", "CLAUDE_CODE_API_KEY",
    "EDITOR", "VISUAL",
    "GIT_AUTHOR_NAME", "GIT_AUTHOR_EMAIL",
    "GIT_COMMITTER_NAME", "GIT_COMMITTER_EMAIL",
    "SSH_AUTH_SOCK",
    "NO_COLOR", "FORCE_COLOR",
    "XDG_CONFIG_HOME", "XDG_DATA_HOME", "XDG_CACHE_HOME",
]

# Claude Code — API only (no git, no npm, no web search)
[[profile]]
name = "claude-api-only"

[profile.network]
mode = "filtered"
allowed_domains = [
    "api.anthropic.com",
    "statsig.anthropic.com",
]
allowed_ports = [443]

[[profile.filesystem.bind]]
source = "~/.claude"
target = "~/.claude"
mode = "rw"
create = true

[[profile.filesystem.bind]]
source = "~/.config"
target = "~/.config"
mode = "rw"
optional = true

[profile.env]
pass = [
    "HOME", "USER", "PATH", "TERM", "LANG",
    "ANTHROPIC_API_KEY", "CLAUDE_CODE_API_KEY",
    "NO_COLOR", "FORCE_COLOR",
]

