mode = "rw"
create = true

[[profile.filesystem.bind]]
source = "~/.yarnrc"
target = "~/.yarnrc"
mode = "ro"
optional = true

[[profile]]
name = "yarn-scripts"

[[profile.match]]
command = "yarn"
args = ["^run$", "^test$", "^start$", "^build$"]

[profile.network]
mode = "none"

[profile.resources]
max_memory = "8G"

[[profile]]
