[[profile]]
name = "npm-install"

[[profile.match]]
command = "npm"
args = ["^install$", "^i$", "^ci$", "^add$", "^update$", "^uninstall$", "^remove$"]

[profile.network]
mode = "filtered"
allowed_domains = [
    "registry.npmjs.org",
    "*.npmjs.org",
    "registry.yarnpkg.com",
    "*.githubusercontent.com",
    "github.com",
    "*.github.com",
]
allowed_ports = [80, 443]

[[profile.filesystem.bind]]
source = "~/.npm"
target = "~/.npm"
mode = "rw"
create = true

[[profile.filesystem.bind]]
source = "~/.npmrc"
target = "~/.npmrc"
mode = "ro"
optional = true

[profile.resources]
max_memory = "4G"

[profile.env]
pass = ["HOME", "USER", "PATH", "TERM", "NODE_ENV", "NPM_CONFIG_REGISTRY", "LANG"]

[[profile]]
name = "npm-scripts"

[[profile.match]]
command = "npm"
args = ["^run$", "^test$", "^start$", "^build$", "^exec$"]

[[profile.match]]
command = "npx"

[profile.network]
mode = "none"

[[profile.filesystem.bind]]
source = "~/.npm"
target = "~/.npm"
mode = "ro"

[profile.resources]
max_memory = "8G"

[profile.env]
pass = ["HOME", "USER", "PATH", "TERM", "NODE_ENV", "CI", "LANG"]

[[profile]]
name = "yarn-install"

[[profile.match]]
command = "yarn"
